version: '3.8'

# Production Docker Compose - для развёртывания в продакшен
# Запуск: docker-compose -f docker-compose.prod.yml up -d

services:
  # ============================================
  # ПРИЛОЖЕНИЯ (СЕРВИСЫ)
  # ============================================
  
  # Веб-приложение (Next.js)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: quantum-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://user-service:3001
    depends_on:
      - user-service
    restart: unless-stopped

  # Сервис пользователей
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: quantum-user-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Торговый сервис
  trading-service:
    build:
      context: ./services/trading-service
      dockerfile: Dockerfile
    container_name: quantum-trading-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - BINANCE_TESTNET=${BINANCE_TESTNET}
      - TELEGRAM_BOT_URL=http://telegram-bot:3003
    depends_on:
      - postgres
      - redis
      - kafka
      - telegram-bot
    restart: unless-stopped

  # AI движок (Python)
  ai-engine:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile
    container_name: quantum-ai-engine
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Telegram бот для уведомлений
  telegram-bot:
    build:
      context: ./services/telegram-bot
      dockerfile: Dockerfile
    container_name: quantum-telegram-bot
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - PORT=3003
    restart: unless-stopped

  # ============================================
  # ИНФРАСТРУКТУРА
  # ============================================
  
  # PostgreSQL - основная БД
  postgres:
    image: postgres:15-alpine
    container_name: quantum-postgres
    environment:
      POSTGRES_USER: quantum
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantum_dev_password}
      POSTGRES_DB: quantum_hedge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis - кэш и сессии
  redis:
    image: redis:7-alpine
    container_name: quantum-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-quantum_redis_password}
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Kafka - очередь сообщений
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: quantum-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  # Zookeeper для Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: quantum-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: quantum-network
